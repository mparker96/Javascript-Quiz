<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Javascript Quiz</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>


  <header>

    <button>Highscores</button>

    <h3 id="timer">Timer:60</h3>


  </header>

  <main>


    <section id="starting-screen" class="card">
      <h2>Javascript Quiz</h2>
      <button id="start-btn">Start Quiz</button>
    </section>

    <section id="question box" class="card" hidden>
      <h2 id="question"></h2>
      <button id="choice-1"></button>
      <button id="choice-2"></button>
      <button id="choice-3"></button>
      <button id="choice-4"></button>
    </section>

    <section id="scores" class="card" hidden>
      <form action="">
        <input type="text" id="initals-input">
        <label for="">Please enter initials</label>
        <button>Submit</button>

      </form>

    </section>


    <section class="card" hidden>
      <h2>Highscores</h2>
      <ol id="highscores">
      </ol>
      <button>Clear</button>
    </section>

  </main>

    <script src="./assets/js/script.js"></script>
</body>

</html>
